name: Quality Gates

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main
      - master

jobs:
  validate:
    name: Wrapper Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pre-commit wrapper suite (full validation mode)
        run: python scripts/run_precommit_suite.py --scope all --reset-baseline --filter-mode full

      - name: Run test wrapper suite
        run: python scripts/run_tests.py
