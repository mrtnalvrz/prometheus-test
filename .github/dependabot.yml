version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "python"
    reviewers:
      - "repository-contributors"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "repository-contributors"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      all-github-actions:
        patterns:
          - "*"
